name: Launch live leaderboard

on:
  workflow_dispatch:
  schedule:
    # 3:45 AM PDT on May 14, 2026. The date guard below keeps this one-time.
    - cron: "45 10 14 5 *"

jobs:
  deploy:
    name: Deploy pga.mordway.com
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - name: Validate scheduled launch window
        id: launch_window
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          current_utc="$(date -u +%Y-%m-%dT%H:%M)"
          case "$current_utc" in
            2026-05-14T10:*|2026-05-14T11:0*|2026-05-14T11:1[0-5])
              echo "should_run=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "should_run=false" >> "$GITHUB_OUTPUT"
              echo "Outside one-time launch window: $current_utc"
              ;;
          esac

      - name: Check out latest main
        if: steps.launch_window.outputs.should_run == 'true'
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Node
        if: steps.launch_window.outputs.should_run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: steps.launch_window.outputs.should_run == 'true'
        run: npm ci

      - name: Lint
        if: steps.launch_window.outputs.should_run == 'true'
        run: npm run lint

      - name: Build
        if: steps.launch_window.outputs.should_run == 'true'
        run: npm run build

      - name: Deploy live Worker
        if: steps.launch_window.outputs.should_run == 'true'
        run: >
          npx wrangler deploy worker.js
          --name pga-mordway
          --assets dist
          --domain pga.mordway.com
          --compatibility-date 2026-05-13
          --compatibility-flag nodejs_compat

      - name: Verify live app
        if: steps.launch_window.outputs.should_run == 'true'
        run: |
          set -euo pipefail
          curl -fsSI https://pga.mordway.com | head -n 1
          curl -fsS https://pga.mordway.com | grep -q '<title>PGA Championship Fantasy Leaderboard'
          curl -fsS https://pga.mordway.com | grep -vq 'Simulation'
          curl -fsS https://pga.mordway.com/api/entries > /tmp/entries.json
          node -e "const fs = require('fs'); const data = JSON.parse(fs.readFileSync('/tmp/entries.json','utf8')); if (!Array.isArray(data.entries) || data.entries.length < 1) throw new Error('No entries returned'); console.log(`${data.entries.length} entries verified`);"
